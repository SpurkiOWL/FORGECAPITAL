<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080a0f" />
    <title>FORGE KAPITAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Unbounded:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="Панель счетов FORGE KAPITAL">
        <div class="brand-row">
          <div>
            <p class="kicker">private balance terminal</p>
            <h1>FORGE KAPITAL</h1>
          </div>
          <div class="status-pill" id="statusPill">Синхронизация</div>
        </div>

        <section class="total-panel" aria-label="Общий баланс">
          <div>
            <p class="panel-label">Общий баланс</p>
            <output class="total-value" id="totalBalance">$0</output>
          </div>
          <div class="pulse-ring" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </section>

        <section class="accounts-zone" aria-label="Счета">
          <button class="nav-button" id="prevBtn" type="button" aria-label="Предыдущие счета">
            ‹
          </button>
          <div class="accounts-viewport">
            <div class="accounts-track" id="accountsTrack"></div>
          </div>
          <button class="nav-button" id="nextBtn" type="button" aria-label="Следующие счета">
            ›
          </button>
        </section>

        <div class="dots" id="dots" aria-label="Навигация по счетам"></div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
